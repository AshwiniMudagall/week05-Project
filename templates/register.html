<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register – FieldOps Manager</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="auth-body">

<div class="auth-wrapper">
  <div class="auth-card card shadow">
    <div class="card-body p-4">

      <!-- Logo -->
      <div class="text-center mb-4">
        <i class="bi bi-lightning-charge-fill text-warning fs-1"></i>
        <h4 class="fw-bold mt-2">FieldOps Manager</h4>
        <p class="text-muted small">Create your account</p>
      </div>

      <!-- Flash Messages -->
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-dismissible fade show py-2" role="alert">
              <i class="bi bi-exclamation-circle me-1"></i>{{ message }}
              <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <!-- Register Form -->
      <form action="{{ url_for('register') }}" method="POST">

        <div class="mb-3">
          <label class="form-label fw-semibold">Full Name <span class="text-danger">*</span></label>
          <input type="text" name="name" class="form-control" placeholder="John Doe" required />
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Phone</label>
          <input type="text" name="phone" class="form-control" placeholder="9876543210" />
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
          <input type="email" name="email" class="form-control" placeholder="you@example.com" required />
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Role <span class="text-danger">*</span></label>
          <select name="role" class="form-select">
            <option value="electrician">Electrician</option>
            <option value="admin">Admin</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Password <span class="text-danger">*</span></label>
          <input type="password" name="password" class="form-control"
                 placeholder="Min 6 characters" required minlength="6" />
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold">Confirm Password <span class="text-danger">*</span></label>
          <input type="password" name="confirm_password" class="form-control"
                 placeholder="Re-enter password" required />
        </div>

        <button type="submit" class="btn btn-primary w-100 fw-semibold">
          <i class="bi bi-person-plus me-2"></i>Register
        </button>

      </form>

      <hr class="my-3" />
      <p class="text-center text-muted small mb-0">
        Already have an account?
        <a href="{{ url_for('login') }}" class="text-primary fw-semibold">Login here</a>
      </p>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
